
# ========================================
# Nginx Gzip 压缩配置
# 适用于攻城塔前端静态资源和API响应
# ========================================

# 启用Gzip压缩
gzip on;

# 压缩级别（1-9，数字越大压缩率越高，CPU占用越高）
gzip_comp_level 6;

# 最小压缩文件大小（字节），小于此值不压缩
gzip_min_length 1024;

# 压缩缓冲区
gzip_buffers 16 8k;

# HTTP版本
gzip_http_version 1.1;

# 允许的Vary头
gzip_vary on;

# 需要压缩的MIME类型
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    application/vnd.ms-fontobject
    application/x-font-ttf
    application/x-javascript
    application/pdf
    application/x-shockwave-flash
    image/svg+xml
    image/x-icon
    font/truetype
    font/opentype
    application/wasm
    application/octet-stream;

# 代理时的压缩策略
gzip_proxied any;

# 禁用IE6以下浏览器的Gzip（兼容性）
gzip_disable "MSIE [1-6]\.";
