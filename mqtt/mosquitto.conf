
# ========================================
# Eclipse Mosquitto MQTT Broker 配置文件
# 古代临冲吕公车结构仿真与稳定性分析系统
# ========================================

# ---------- 基础配置 ----------

# 监听端口（MQTT标准端口）
listener 1883
protocol mqtt

# 监听地址（0.0.0.0表示允许所有来源）
bind_address 0.0.0.0

# WebSocket监听端口（用于前端MQTT over WS）
listener 9001
protocol websockets

# 进程ID文件
pid_file /mosquitto/data/mosquitto.pid

# 允许的最大连接数
max_connections -1

# ---------- 安全配置 ----------

# 允许匿名连接（仅测试环境使用！生产环境应设置为false并配置用户名密码）
allow_anonymous true

# 密码文件（如启用认证）
# password_file /mosquitto/config/passwd

# ACL访问控制列表
# acl_file /mosquitto/config/aclfile

# ---------- 持久化配置 ----------

# 启用持久化
persistence true

# 持久化文件位置
persistence_location /mosquitto/data/

# 持久化文件名
persistence_file mosquitto.db

# 自动保存间隔（秒）或变更条数
autosave_interval 1800
autosave_on_changes true

# ---------- 日志配置 ----------

# 日志类型
log_type all
log_type error
log_type warning
log_type notice
log_type information
log_type subscribe
log_type unsubscribe

# 日志输出（stdout，方便docker logs查看）
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log

# 日志时间戳格式
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ---------- 性能调优 ----------

# 最大队列消息数
max_queued_messages 1000

# 队列溢出行为：0 = 丢弃最旧，1 = 丢弃最新，2 = 断开连接
queue_qos0_messages true

# 单客户端最大未确认消息数
max_inflight_bytes 0
max_inflight_messages 200

# 消息最大大小（字节）：默认256MB，攻城塔数据不需要太大
message_size_limit 20971520

# ---------- 会话配置 ----------

# 持久化客户端过期时间（秒）
persistent_client_expiration 1M

# ---------- 桥梁配置（可选：集群桥接） ----------
# connection other-broker
# address other-broker.example.com:1883
# topic siege_tower/sensor/# both 0
# topic siege_tower/alert/# both 0
# topic siege_tower/analysis/# both 0

# ---------- 心跳配置 ----------
keepalive_interval 60

# ---------- 连接超时 ----------
connection_messages true
