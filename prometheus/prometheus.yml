
# ============================================================
# Prometheus 配置 - 攻城塔结构仿真系统指标采集
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'siege-tower-monitor'
    environment: 'production'

# 告警规则文件
rule_files:
  - "alerts.yml"

# 告警管理器
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# 抓取目标配置
scrape_configs:
  # 1. Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 2. 攻城塔后端 Rust 服务 (HTTP 指标 + /metrics 端点)
  - job_name: 'siege-tower-backend'
    metrics_path: '/metrics'
    scheme: 'http'
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: 'backend'
          component: 'rust-api'
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'siege_tower_.*'
        action: keep

  # 3. ClickHouse 指标 (通过内置 /metrics 端点)
  - job_name: 'clickhouse'
    metrics_path: '/metrics'
    scheme: 'http'
    scrape_interval: 30s
    static_configs:
      - targets: ['clickhouse:9363']
        labels:
          service: 'clickhouse'
          component: 'timeseries-db'

  # 4. MQTT Broker Mosquitto (如果启用了exporter)
  - job_name: 'mqtt-broker'
    scrape_interval: 30s
    static_configs:
      - targets: ['mqtt:1883']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'mqtt-exporter:9234'

# ============================================================
# 示例告警规则
# ============================================================
groups:
  - name: siege_tower_alerts
    interval: 30s
    rules:
      - alert: StructureSafetyFactorLow
        expr: siege_tower_structure_safety_factor < 1.2
        for: 2m
        labels:
          severity: critical
          category: structure
        annotations:
          summary: "塔 {{ $labels.tower_id }} 结构安全系数过低"
          description: "安全系数 = {{ $value }} < 1.2 已持续2分钟，需立即检查"

      - alert: HighBearingUtilization
        expr: siege_tower_soil_bearing_ratio > 0.85
        for: 5m
        labels:
          severity: warning
          category: soil
        annotations:
          summary: "塔 {{ $labels.tower_id }} 土壤承载力利用率高"
          description: "{{ $labels.soil_type }} 承载力利用率 = {{ $value }} > 85%"

      - alert: FEMAnalysisError
        rate(siege_tower_fem_analysis_errors_total[5m]) > 0.1
        for: 1m
        labels:
          severity: warning
          category: fem
        annotations:
          summary: "塔 {{ $labels.tower_id }} FEM分析出错率高"
          description: "5分钟内错误率超过10%"

      - alert: HighErrorRate5xx
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          category: api
        annotations:
          summary: "API 5xx错误率过高"
          description: "5分钟内错误率 = {{ $value }} > 5%"

      - alert: ServiceDown
        expr: up{job="siege-tower-backend"} == 0
        for: 1m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "攻城塔后端服务不可用"
          description: "Prometheus 无法连接到 backend:8080"
